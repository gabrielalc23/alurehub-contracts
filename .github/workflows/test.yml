name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Dockerized Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Build Docker image
        run: docker build -t allurehub-contracts .

      - name: Run Forge fmt
        run: docker run --rm allurehub-contracts fmt --check

      - name: Run Forge build
        run: docker run --rm allurehub-contracts build --sizes

      - name: Run Forge tests
        run: docker run --rm allurehub-contracts test -vvv
